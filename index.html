<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==">
    <link rel="stylesheet" href="./style.css">
    <title>Nexus Games | Unblocked Arcade</title>
  </head>
  <body>
    <div class="atmosphere">
      <div class="glow glow-orange"></div>
      <div class="glow glow-blue"></div>
    </div>

    <div class="container">
      <header>
        <div>
          <div class="brand">
            <div class="icon-box">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line></svg>
            </div>
            <span class="brand-label">Nexus Arcade</span>
          </div>
          <h1 class="font-display">Unblocked<br>Unlimited.</h1>
        </div>

        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" placeholder="Search games...">
        </div>
      </header>

      <main class="game-grid" id="gameGrid">
        <!-- Games will be injected here -->
      </main>

      <footer>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
          <span class="brand-label" style="opacity: 0.5;">Nexus Arcade &copy; 2026</span>
          <p style="color: var(--text-muted); font-size: 0.75rem;">Premium Unblocked Gaming Experience</p>
        </div>
      </footer>
    </div>

    <!-- Game Viewer Modal -->
    <div class="game-viewer" id="gameViewer">
      <div class="viewer-header">
        <div class="viewer-info">
          <button class="back-btn" id="backBtn">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </button>
          <div class="viewer-title-box">
            <h2 id="viewerTitle" class="font-display">Game Title</h2>
            <div class="session-status">
              <div class="status-dot"></div>
              In-Session
            </div>
          </div>
        </div>
      </div>
      <iframe id="gameIframe" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
